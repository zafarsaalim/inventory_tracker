name: Build APK

on:
  push:
    branches: [ "python-version" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo6 \
            cmake libffi-dev libssl-dev

      # 🔥 OLD SDK (required for buildozer compatibility)
      - name: Install Android SDK (old tools)
        run: |
          mkdir -p $HOME/android-sdk/tools
          cd $HOME/android-sdk/tools
          wget https://dl.google.com/android/repository/tools_r25.2.5-linux.zip -O tools.zip
          unzip tools.zip

      - name: Set Android environment
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/android-sdk/tools/bin:$HOME/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 virtualenv buildozer

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk/
