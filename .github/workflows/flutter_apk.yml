name: Generate Flutter Structure Only

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Explicit Flutter installation using a different action
      - name: Install Flutter
        uses: flutter/flutter-action@v2
        with:
          flutter-version: '3.7.6'  # Specify stable version directly

      - name: Generate Flutter project structure
        run: flutter create .

      - name: Commit generated structure
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add android ios web linux macos windows pubspec.yaml
          git commit -m "Generate Flutter platform structure" || echo "No changes"
          git push
