name: Bootstrap Flutter App

on:
  workflow_dispatch:   # manual trigger (recommended)
  push:
    branches: ["main"]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Create Flutter app (only if not exists)
      - name: Create project
        run: |
          if [ ! -d "lib" ]; then
            flutter create .
          fi

      # 4. Commit generated files
      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto-generate Flutter project" || echo "No changes"

      # 5. Push back to repo
      - name: Push changes
        run: git push
