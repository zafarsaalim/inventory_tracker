<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client</title>
  <style>
    body { font-family: Arial; padding:15px; background:#f5f5f5; }

    .card {
      background:white;
      padding:12px;
      margin-bottom:10px;
      border-radius:8px;
    }

    .top {
      margin-bottom:15px;
    }

    .btn {
      display:inline-block;
      padding:8px 12px;
      background:#007bff;
      color:white;
      text-decoration:none;
      border-radius:5px;
      margin-top:10px;
    }

    .entry {
      padding:10px;
      border-bottom:1px solid #eee;
    }

    .given { color:red; }
    .received { color:green; }
  </style>
</head>
<body>

<div class="card top">
  <h2>{{ client[1] }}</h2>
  <div>Balance: ₹{{ balance }}</div>
  <a class="btn" href="/add-entry/{{ client[0] }}">+ Add Entry</a>
</div>

<div class="card">
  <h3>History</h3>

  {% for e in entries %}
    <div class="entry">
      <div class="{{ e[1] }}">
        {{ e[1] }}: ₹{{ e[0] }}
      </div>
      <small>{{ e[2] }}</small>
    </div>
  {% endfor %}

</div>

</body>
</html>
