name: Restore Missing Android Folder

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable

      - name: Restore missing platform folders (android, ios)
        run: |
          flutter create .

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add android ios pubspec.yaml
          git commit -m "Restore missing Flutter platform folders" || echo "No changes"
          git push
