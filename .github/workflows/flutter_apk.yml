name: Build APK (Lightweight)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # 🟢 LIGHTWEIGHT BUILD (your requirement)
      - name: Build APK (fast profile build)
        run: flutter build apk --profile --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: inventory-apk
          path: build/app/outputs/flutter-apk/*.apk
