name: Generate Flutter Project Structure

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Flutter with a stable version explicitly specified
      - name: Install Flutter SDK
        uses: flutter/flutter-action@v2
        with:
          flutter-version: '3.7.6'  # Specify the exact Flutter version here

      # 3. Verify Flutter installation
      - name: Verify Flutter installation
        run: flutter doctor

      # 4. Generate Flutter project structure (android/ folder will be created)
      - name: Generate Flutter project structure2
        run: flutter create .

      # 5. Commit generated project files back to the repo (including android/)
      - name: Commit generated project files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Generate Flutter project structure"
          git push
